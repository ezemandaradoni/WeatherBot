services:
  - type: worker
    name: telegram-rain-alert-bot
    runtime: node
    plan: starter
    region: oregon
    rootDir: RainBot
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: rain-bot-data
      mountPath: /opt/render/project/src/render-data
      sizeGB: 1
    envVars:
      - key: CHECK_INTERVAL_MINUTES
        value: "15"
      - key: DATA_DIR
        value: /opt/render/project/src/render-data
      - key: WEATHER_API_KEY
        sync: false
      - key: RAIN_TELEGRAM_BOT_TOKEN
        sync: false
      - key: RAIN_TELEGRAM_CHAT_ID
        sync: false
